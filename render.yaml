services:
  - type: web
    name: kiu-career-hub
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://kiu-career-hub.onrender.com
      - key: DEMO_LOGINS_ENABLED
        value: "true"
      - key: ALLOW_ADMIN_REGISTER
        value: "false"
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
